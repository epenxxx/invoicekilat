<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvoiceKilat — Smart Invoice 2026</title>
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
:root{--bg:#030711;--card:rgba(15,23,42,0.6);--border:rgba(30,41,59,0.5);--acc:#3b82f6;--acc-glow:rgba(59,130,246,0.4);--txt:#f8fafc;--mut:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",sans-serif;background-color:var(--bg);background-image:radial-gradient(circle at 50% 0%,#1e293b 0%,var(--bg) 70%);color:var(--txt);min-height:100vh;padding:40px 20px}
.wrap{max-width:1000px;margin:0 auto}
header{text-align:center;margin-bottom:50px}
h1{font-size:3.5rem;font-weight:800;background:linear-gradient(to bottom right,#fff,#64748b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bento{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px}
.card{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:24px;padding:24px}
.span-2{grid-column:span 2}
label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
input,textarea{width:100%;background:rgba(2,6,23,.8);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--txt)}
.btn-primary{background:var(--acc);color:#fff;padding:14px;border-radius:14px;font-weight:700;border:none;cursor:pointer;width:100%}
.preview{margin-top:40px;background:#fff;color:#0f172a;border-radius:32px;padding:40px;display:none}
table{width:100%;border-collapse:collapse;margin:30px 0}
th{text-align:left;color:#94a3b8;font-size:.7rem;text-transform:uppercase;padding-bottom:12px;border-bottom:1px solid #f1f5f9}
td{padding:16px 0;border-bottom:1px solid #f8fafc}
.r{text-align:right}
.total-val{font-size:2rem;font-weight:900;color:var(--acc)}
.aff-item{background:rgba(30,41,59,.2);border:1px solid var(--border);border-radius:20px;padding:20px;text-align:center;text-decoration:none;display:block}
footer{margin-top:80px;text-align:center;color:var(--mut);font-size:.8rem}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>InvoiceKilat</h1><p style="color:var(--mut)">Professional, Private, Free.</p></header>
  <div class="bento">
    <div class="card span-2">
      <label>Identity</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
        <input id="from" value="Nama Usaha Anda"><input id="to" value="Nama Klien">
      </div>
    </div>
    <div class="card"><label>Tax (%)</label><input id="tax" type="number" value="11"><button class="btn-primary" onclick="gen()" style="margin-top:15px">Generate</button></div>
    <div class="card span-2"><label>Items (Name, Qty, Price)</label><textarea id="items" rows="4">Design, 1, 2000000</textarea></div>
    <div class="card" style="text-align:center">🚀<br><b>Ready</b></div>
  </div>
  <div class="preview" id="preview"></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:50px">
    <a href="#" class="aff-item"><span>Domain</span><br><strong style="color:white">Namecheap</strong></a>
    <a href="#" class="aff-item"><span>Hosting</span><br><strong style="color:white">Hostinger</strong></a>
    <a href="#" class="aff-item"><span>Payments</span><br><strong style="color:white">Stripe</strong></a>
  </div>
  <footer>&copy; 2026 InvoiceKilat</footer>
</div>
<script>
function fmt(n){return "Rp "+Math.round(n).toLocaleString("id-ID")}
function gen(){
  const from=document.getElementById("from").value, to=document.getElementById("to").value, tax=parseFloat(document.getElementById("tax").value)||0;
  let rows="",sub=0;
  document.getElementById("items").value.split("\n").forEach(l=>{
    const p=l.split(","); if(p.length<3)return;
    const name=p[0].trim(),qty=parseFloat(p[1])||0,price=parseFloat(p[2])||0;
    const tot=qty*price;sub+=tot;
    rows+=`<tr><td>${name}</td><td class="r">${qty}</td><td class="r">${fmt(price)}</td><td class="r">${fmt(tot)}</td></tr>`;
  });
  const taxAmt=sub*tax/100, total=sub+taxAmt;
  const p=document.getElementById("preview"); p.style.display="block";
  p.innerHTML=`<h2>${from}</h2><p>Billed to: ${to}</p><table><thead><tr><th>Item</th><th class="r">Qty</th><th class="r">Rate</th><th class="r">Total</th></tr></thead><tbody>${rows}</tbody></table><div class="r"><p>Subtotal: ${fmt(sub)}</p><p>Tax: ${fmt(taxAmt)}</p><div class="total-val">${fmt(total)}</div></div>`;
  p.scrollIntoView({behavior:"smooth"});
}
</script>
</body>
</html>
